<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMG Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);--text:#f0f0f0;--muted:#8b8fa8;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;--orange:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
.top-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.brand h1{font-size:17px;font-weight:600;}
.brand .sub{font-size:11px;color:var(--muted);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.freshness{font-size:11px;color:var(--muted);text-align:right;}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 13px;border-radius:6px;cursor:pointer;font-size:12px;}
.btn:hover{background:var(--blue);border-color:var(--blue);}
.nav{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem;}
.nav-tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--blue);}
.nav-dot{width:7px;height:7px;border-radius:50%;}
.page{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto;display:none;}
.page.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:1.25rem;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}
.kpi.blue::before{background:var(--blue)}.kpi.green::before{background:var(--green)}.kpi.yellow::before{background:var(--yellow)}.kpi.red::before{background:var(--red)}.kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.kpi-value{font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;}
.kpi-note{font-size:11px;color:var(--muted);margin-top:5px;}
.kpi-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px;}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.three-col{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem;}
.full{margin-bottom:1rem;}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr;}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.chart-wrap{position:relative;width:100%;}
.month-bar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
.month-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.month-btn{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;}
.month-btn:hover{border-color:var(--blue);color:var(--text);}
.month-btn.active{background:var(--blue);border-color:var(--blue);color:white;}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{text-align:left;padding:6px 10px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;}
.data-table th:not(:first-child){text-align:right;}
.data-table td{padding:9px 10px;border-bottom:1px solid var(--border2);font-variant-numeric:tabular-nums;}
.data-table td:not(:first-child){text-align:right;}
.data-table tbody tr{cursor:pointer;transition:background .12s;}
.data-table tbody tr:hover td{background:var(--bg3);}
.data-table tbody tr:last-child td{border-bottom:none;}
.hint{font-size:10px;color:var(--blue);opacity:0;transition:opacity .15s;}
.data-table tbody tr:hover .hint{opacity:1;}
.pct-bar-wrap{background:rgba(255,255,255,.06);border-radius:2px;height:3px;margin-top:3px;}
.pct-bar{height:3px;border-radius:2px;}
.trend-up{color:var(--green)}.trend-dn{color:var(--red)}.trend-flat{color:var(--muted)}
.summary-list{list-style:none;}
.summary-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:#c8cae0;line-height:1.6;}
.summary-list li:last-child{border-bottom:none;}
.hi-green{color:var(--green);font-weight:600}.hi-red{color:var(--red);font-weight:600}.hi-yellow{color:var(--yellow);font-weight:600}.hi-blue{color:var(--blue);font-weight:600}
.watch-list{display:flex;flex-direction:column;gap:8px;}
.watch-item{background:var(--bg3);border-radius:7px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.watch-name{font-size:13px;font-weight:500;}
.watch-detail{font-size:11px;color:var(--muted);margin-top:2px;}
.watch-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.tag-growth{background:rgba(34,197,94,.15);color:var(--green)}.tag-decline{background:rgba(239,68,68,.15);color:var(--red)}.tag-missing{background:rgba(245,158,11,.15);color:var(--yellow)}.tag-risk{background:rgba(168,85,247,.15);color:var(--purple)}.tag-pace{background:rgba(239,68,68,.15);color:var(--red)}
.source-split{display:flex;gap:1rem;margin-top:.5rem;}
.source-block{flex:1;background:var(--bg3);border-radius:8px;padding:1rem;text-align:center;}
.source-block .sv{font-size:20px;font-weight:600;margin-bottom:4px;}
.source-block .sl{font-size:11px;color:var(--muted);}
.source-block .sp{font-size:13px;font-weight:600;margin-top:4px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.bar-month{width:30px;color:var(--muted);font-size:11px;flex-shrink:0;}
.bar-bg{flex:1;background:rgba(255,255,255,.05);border-radius:4px;height:20px;position:relative;overflow:hidden;}
.bar-ly{height:100%;border-radius:4px;position:absolute;top:0;left:0;}
.bar-bud{height:4px;background:var(--yellow);position:absolute;top:8px;left:0;border-radius:2px;}
.bar-val{width:68px;text-align:right;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;}
.badge-sm{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;width:70px;text-align:center;flex-shrink:0;}
/* DRILL PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;}
.overlay.open{display:block;}
.drill{position:fixed;top:0;right:0;bottom:0;width:min(780px,100vw);background:var(--bg2);border-left:1px solid var(--border);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;}
.drill.open{transform:translateX(0);}
.drill-hdr{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:10;}
.drill-back{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;}
.drill-back:hover{background:var(--blue);border-color:var(--blue);}
.drill-title{font-size:16px;font-weight:600;}
.drill-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.drill-body{padding:1.25rem 1.5rem;flex:1;}
.drill-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem;}
.drill-kpi{background:var(--bg3);border-radius:8px;padding:.9rem 1rem;}
.drill-kpi .kl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.drill-kpi .kv{font-size:18px;font-weight:600;font-variant-numeric:tabular-nums;}
.drill-kpi .kn{font-size:11px;color:var(--muted);margin-top:4px;}
.drill-sec{margin-bottom:1.25rem;}
.drill-sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;}
.drill-table{width:100%;border-collapse:collapse;font-size:12px;}
.drill-table th{text-align:left;padding:6px 8px;color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.drill-table th:not(:first-child){text-align:right;}
.drill-table td{padding:8px 8px;border-bottom:1px solid var(--border2);font-variant-numeric:tabular-nums;}
.drill-table td:not(:first-child){text-align:right;}
.drill-table tr:last-child td{border-bottom:none;}
.up{color:var(--green)}.dn{color:var(--red)}.flat{color:var(--muted)}
.state-box{text-align:center;padding:4rem 2rem;color:var(--muted);}
.state-box h3{font-size:16px;color:var(--text);margin-bottom:8px;}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="top-header">
  <div class="brand">
    <h1>SMG Command Center</h1>
    <div class="sub">Sports Media Group · Affiliate Programmatic Monetization · GAM + Xandr</div>
  </div>
  <div class="header-right">
    <div class="freshness"><span id="fu">Loading…</span><br><span id="fr" style="color:var(--muted)"></span></div>
    <button class="btn" onclick="init()">↻ Refresh</button>
  </div>
</div>

<nav class="nav">
  <div class="nav-tab active" id="tab-rev" onclick="showPage('rev',this)"><span class="nav-dot" style="background:#3b82f6"></span>Revenue</div>
  <div class="nav-tab" id="tab-tra" onclick="showPage('tra',this)"><span class="nav-dot" style="background:#14b8a6"></span>Traffic</div>
  <div class="nav-tab" id="tab-pl" onclick="showPage('pl',this)"><span class="nav-dot" style="background:#a855f7"></span>P&L / Goals</div>
</nav>

<!-- REVENUE PAGE -->
<div class="page active" id="page-rev">
  <div class="state-box" id="rev-state"><div class="spinner"></div><h3>Loading…</h3></div>
  <div id="rev-main" style="display:none"></div>
</div>

<!-- TRAFFIC PAGE -->
<div class="page" id="page-tra">
  <div id="tra-main"></div>
</div>

<!-- P&L / GOALS PAGE -->
<div class="page" id="page-pl">
  <div id="pl-main"></div>
</div>

<!-- DRILL OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrill()"></div>
<div class="drill" id="drill">
  <div class="drill-hdr">
    <button class="drill-back" onclick="closeDrill()">← Back</button>
    <div><div class="drill-title" id="drill-title"></div><div class="drill-sub" id="drill-sub"></div></div>
  </div>
  <div class="drill-body" id="drill-body"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SHEET_REV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhaI9xxF-xRVcZ4QsBIvFVzEuMw-nuS65dK7Of_bb2OSJC91x4vL1OKc7V4fSLE0-vKalXgc-3LcD8/pub?gid=0&single=true&output=csv';
const SHEET_BUD = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhaI9xxF-xRVcZ4QsBIvFVzEuMw-nuS65dK7Of_bb2OSJC91x4vL1OKc7V4fSLE0-vKalXgc-3LcD8/pub?gid=1409500423&single=true&output=csv';
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const dim = (y,m) => new Date(y,m,0).getDate();
const pn  = s => parseFloat(String(s||'').replace(/[$,]/g,''))||0;
const fd  = (v,d=0) => '$'+v.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fk  = v => v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':fd(v,2);
const fp  = v => (v>=0?'+':'')+v.toFixed(1)+'%';
const dl  = d => { const p=d.split('-'); return MN[+p[1]-1]+' '+parseInt(p[2]); };

let ALL=[],BUD=[],CHARTS={},SEL_MONTH=null,CACHED_BUD=[];

// ── NAVIGATION ───────────────────────────────────────────────────
function showPage(id,el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-'+id).classList.add('active');
}

// ── DRILL DOWN ───────────────────────────────────────────────────
function openDrill(name){
  const rows = ALL.filter(r => (r.Partner||r.Category||'').replace(/^SMG_/,'').trim() === name);
  if(!rows.length){ alert('No data for: '+name); return; }

  const dates = [...new Set(rows.map(r=>r.Date))].sort();
  const maxD  = dates[dates.length-1];
  const [yr,mo] = maxD.split('-').map(Number);
  const pfx   = yr+'-'+String(mo).padStart(2,'0');
  const mtd   = rows.filter(r=>r.Date.startsWith(pfx));

  const mRev  = mtd.reduce((s,r)=>s+pn(r.Revenue),0);
  const mImp  = mtd.reduce((s,r)=>s+pn(r.Impressions),0);
  const mEcpm = mImp>0?mRev/(mImp/1000):0;
  const mDays = parseInt(maxD.split('-')[2]);
  const avg   = mDays>0?mRev/mDays:0;

  const d7d   = dates.slice(-7);
  const d7p   = dates.slice(-14,-7);
  const r7    = rows.filter(r=>d7d.includes(r.Date)).reduce((s,r)=>s+pn(r.Revenue),0);
  const r7p   = rows.filter(r=>d7p.includes(r.Date)).reduce((s,r)=>s+pn(r.Revenue),0);
  const t7    = r7p>0?(r7-r7p)/r7p*100:null;
  const a7    = r7/Math.min(7,d7d.length);

  const byDate={};
  rows.forEach(r=>{
    if(!byDate[r.Date])byDate[r.Date]={rev:0,imp:0};
    byDate[r.Date].rev+=pn(r.Revenue);
    byDate[r.Date].imp+=pn(r.Impressions);
  });

  const src = rows[0].Source||'GAM';
  const tCls = t7===null?'flat':t7>0?'up':'dn';

  document.getElementById('drill-title').textContent = name;
  document.getElementById('drill-sub').textContent   = src+' · '+MN[mo-1]+' '+yr+' MTD';

  document.getElementById('drill-body').innerHTML = `
    <div class="drill-kpis">
      <div class="drill-kpi"><div class="kl">MTD Revenue</div><div class="kv">${fk(mRev)}</div><div class="kn">${mDays} days</div></div>
      <div class="drill-kpi"><div class="kl">Avg Daily</div><div class="kv">${fk(avg)}</div><div class="kn">per day MTD</div></div>
      <div class="drill-kpi"><div class="kl">7-Day Avg</div><div class="kv">${fk(a7)}</div><div class="kn class="${tCls}">${t7!==null?fp(t7)+' vs prior 7d':'—'}</div></div>
      <div class="drill-kpi"><div class="kl">Impressions</div><div class="kv">${(mImp/1e6).toFixed(2)}M</div><div class="kn">MTD</div></div>
      <div class="drill-kpi"><div class="kl">eCPM</div><div class="kv">${fd(mEcpm,2)}</div><div class="kn">weighted avg</div></div>
    </div>
    <div class="drill-sec">
      <div class="drill-sec-title">Daily revenue</div>
      <div class="chart-wrap" style="height:200px"><canvas id="dc"></canvas></div>
    </div>
    <div class="drill-sec">
      <div class="drill-sec-title">Day-by-day</div>
      <table class="drill-table">
        <thead><tr><th>Date</th><th>Revenue</th><th>Impressions</th><th>eCPM</th><th>vs Prior Day</th></tr></thead>
        <tbody>${dates.slice().reverse().map((d,i,arr)=>{
          const v=byDate[d]||{rev:0,imp:0};
          const e=v.imp>0?v.rev/(v.imp/1000):0;
          const prev=byDate[arr[i+1]]||null;
          const dlt=prev&&prev.rev>0?(v.rev-prev.rev)/prev.rev*100:null;
          const dc=dlt===null?'flat':dlt>0?'up':'dn';
          return `<tr><td>${dl(d)}</td><td>${fk(v.rev)}</td><td>${(v.imp/1e3).toFixed(0)}K</td><td>${fd(e,2)}</td><td class="${dc}">${dlt===null?'—':fp(dlt)}</td></tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drill').classList.add('open');
  document.body.style.overflow='hidden';

  // Draw chart after panel visible
  setTimeout(()=>{
    if(CHARTS.drill){try{CHARTS.drill.destroy();}catch(e){}}
    const ctx=document.getElementById('dc');
    if(!ctx)return;
    CHARTS.drill=new Chart(ctx,{
      type:'bar',
      data:{
        labels:dates.map(dl),
        datasets:[{label:'Revenue',data:dates.map(d=>(byDate[d]||{rev:0}).rev),backgroundColor:src==='GAM'?'#3b82f6':'#a855f7',borderRadius:4,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fk(c.raw)}}},
        scales:{x:{grid:{display:false},ticks:{color:'#8b8fa8',font:{size:10},maxTicksLimit:14,maxRotation:45}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8b8fa8',font:{size:10},callback:v=>fk(v)}}}}
    });
  },50);
}

function closeDrill(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drill').classList.remove('open');
  document.body.style.overflow='';
  if(CHARTS.drill){try{CHARTS.drill.destroy();}catch(e){}}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrill();});

// ── DATA FETCH ───────────────────────────────────────────────────
function fetchCSV(url){
  return fetch(url)
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(t=>new Promise(res=>Papa.parse(t,{header:true,skipEmptyLines:true,complete:r=>res(r.data)})));
}

async function init(){
  Object.values(CHARTS).forEach(c=>{try{c.destroy();}catch(e){}});
  CHARTS={};
  document.getElementById('rev-state').style.display='';
  document.getElementById('rev-main').style.display='none';
  try{
    const [r1,r2]=await Promise.all([fetchCSV(SHEET_REV),fetchCSV(SHEET_BUD)]);
    ALL=r1.filter(r=>r.Date&&r.Revenue);
    CACHED_BUD=r2;
    const months=[...new Set(ALL.map(r=>r.Date.slice(0,7)))].sort();
    if(!SEL_MONTH||!months.includes(SEL_MONTH)) SEL_MONTH=months[months.length-1];
    buildRev();
  }catch(e){
    document.getElementById('rev-state').innerHTML=`<h3>⚠️ Error loading data</h3><p style="margin-top:8px;font-size:13px">${e.message}</p>`;
  }
}

function selectMonth(m){
  SEL_MONTH=m;
  buildRev();
}

// ── BUILD REVENUE PAGE ───────────────────────────────────────────
function buildRev(){
  const rows2=CACHED_BUD;
  const allDates=[...new Set(ALL.map(r=>r.Date))].sort();
  const months=[...new Set(allDates.map(d=>d.slice(0,7)))].sort();
  const pfx=SEL_MONTH;
  const [yr,mo]=pfx.split('-').map(Number);
  const totDays=dim(yr,mo);
  const maxD=allDates.filter(d=>d.startsWith(pfx)).slice(-1)[0]||allDates[allDates.length-1];
  const minD=allDates[0];
  const elapsed=parseInt(maxD.split('-')[2]);
  const remaining=totDays-elapsed;

  const mtd=ALL.filter(r=>r.Date.startsWith(pfx));
  const mRev=mtd.reduce((s,r)=>s+pn(r.Revenue),0);
  const mGAM=mtd.filter(r=>r.Source==='GAM').reduce((s,r)=>s+pn(r.Revenue),0);
  const mXan=mtd.filter(r=>r.Source==='Xandr').reduce((s,r)=>s+pn(r.Revenue),0);

  const budRow=rows2.find(r=>r.Month&&r.Month.startsWith(pfx));
  const bud=budRow?pn(budRow.Budget):0;
  const ly=budRow?pn(budRow['LY Actual']):0;
  const fore=elapsed>0?(mRev/elapsed)*totDays:0;
  const pace=bud>0?fore/bud*100:0;
  const varB=fore-bud;
  const req=remaining>0?(bud-mRev)/remaining:0;
  const avgD=elapsed>0?mRev/elapsed:0;
  const pc=pace>=100?'green':pace>=90?'yellow':'red';
  const bc=pace>=100?'badge-green':pace>=90?'badge-yellow':'badge-red';

  // 7-day windows use ALL dates (not month-filtered) for accurate trends
  const allDatesSorted=[...new Set(ALL.map(r=>r.Date))].sort();
  const d7d=allDatesSorted.slice(-7);
  const d7p=allDatesSorted.slice(-14,-7);

  // Partner aggregation
  const PM={};
  mtd.forEach(r=>{
    const k=(r.Partner||r.Category||'Unknown').replace(/^SMG_/,'').trim();
    if(!PM[k])PM[k]={rev:0,imp:0,source:r.Source,d7:0,d7p:0,today:0};
    PM[k].rev+=pn(r.Revenue);
    PM[k].imp+=pn(r.Impressions);
  });
  ALL.forEach(r=>{
    const k=(r.Partner||r.Category||'Unknown').replace(/^SMG_/,'').trim();
    if(!PM[k])return;
    if(d7d.includes(r.Date))PM[k].d7+=pn(r.Revenue);
    if(d7p.includes(r.Date))PM[k].d7p+=pn(r.Revenue);
    if(r.Date===maxD)PM[k].today+=pn(r.Revenue); // maxD is last date in selected month
  });
  const partners=Object.entries(PM).sort((a,b)=>b[1].rev-a[1].rev);
  const totRev=partners.reduce((s,[,v])=>s+v.rev,0);

  // Watchlist
  const WL=[];
  partners.forEach(([n,p])=>{
    const t=p.d7p>0?(p.d7-p.d7p)/p.d7p*100:null;
    const sh=totRev>0?p.rev/totRev*100:0;
    if(t!==null&&t<=-20)WL.push({n,tag:'decline',lbl:'Declining',det:'7-day: '+fp(t)});
    if(p.today===0&&p.d7>100)WL.push({n,tag:'missing',lbl:'Missing Data',det:'No revenue today'});
    if(sh>=10)WL.push({n,tag:'risk',lbl:'Concentration Risk',det:sh.toFixed(1)+'% of MTD'});
    if(t!==null&&t>=20)WL.push({n,tag:'growth',lbl:'Growth Driver',det:'7-day: '+fp(t)});
  });
  if(pace<95&&bud>0)WL.push({n:'Overall',tag:'pace',lbl:'Below Pace',det:'Forecast at '+pace.toFixed(1)+'% of budget'});

  // Daily totals
  const DT={},DG={},DX={};
  ALL.forEach(r=>{
    DT[r.Date]=(DT[r.Date]||0)+pn(r.Revenue);
    if(r.Source==='GAM')DG[r.Date]=(DG[r.Date]||0)+pn(r.Revenue);
    if(r.Source==='Xandr')DX[r.Date]=(DX[r.Date]||0)+pn(r.Revenue);
  });

  const selDates=allDates.filter(d=>d.startsWith(pfx));
  let cum=0;
  const cumD=selDates.map(d=>{cum+=(DT[d]||0);return cum;});
  const cumB=selDates.map((_,i)=>(bud/totDays)*(i+1));

  // Update header
  document.getElementById('fu').textContent='Updated: '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('fr').textContent='Data: '+dl(minD)+' – '+dl(maxD);

  // Risers/decliners
  const wt=partners.map(([n,p])=>({n,t:p.d7p>0?(p.d7-p.d7p)/p.d7p*100:null})).filter(x=>x.t!==null);
  const risers=[...wt].sort((a,b)=>b.t-a.t).slice(0,3);
  const decls=[...wt].sort((a,b)=>a.t-b.t).slice(0,3);
  const gp=mRev>0?(mGAM/mRev*100).toFixed(0):0;
  const xp=mRev>0?(mXan/mRev*100).toFixed(0):0;
  // maxLY removed (budget bar chart replaced with run rate table)

  const el=document.getElementById('rev-main');
  el.innerHTML=`
    <div class="month-bar" id="mbr"></div>
    <div class="kpi-grid" id="kpis"></div>
    <div class="three-col">
      <div class="card">
        <div class="card-title">Cumulative revenue vs budget <span style="font-weight:400;text-transform:none;letter-spacing:0">${MN[mo-1]} ${yr}</span></div>
        <div class="chart-wrap" style="height:220px"><canvas id="cc"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Executive summary</div>
        <ul class="summary-list" id="es"></ul>
      </div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-title">Daily revenue — GAM vs Xandr</div>
        <div class="chart-wrap" style="height:200px"><canvas id="dc2"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Source split — MTD</div>
        <div class="source-split" id="ss"></div>
        <div class="chart-wrap" style="height:150px;margin-top:1rem"><canvas id="sc"></canvas></div>
      </div>
    </div>
    <div class="three-col">
      <div class="card">
        <div class="card-title">Top supply partners — MTD <span style="font-size:10px;color:var(--blue);font-weight:400;text-transform:none;letter-spacing:0">click any row to drill down →</span></div>
        <div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Partner</th><th>MTD Rev</th><th>% Total</th><th>Today</th><th>7-Day Avg</th><th>7-Day Trend</th><th>eCPM</th></tr></thead><tbody id="pt"></tbody></table></div>
      </div>
      <div class="card">
        <div class="card-title">Watchlist <span id="wc" style="background:rgba(239,68,68,.15);color:var(--red);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700"></span></div>
        <div class="watch-list" id="wl"></div>
      </div>
    </div>
  `;

  // Month buttons
  document.getElementById('mbr').innerHTML='<span class="month-lbl">Month:</span>'+
    months.map(m=>`<button class="month-btn${m===pfx?' active':''}" data-m="${m}">${MN[+m.split('-')[1]-1]} ${m.split('-')[0]}</button>`).join('');
  document.getElementById('mbr').querySelectorAll('.month-btn').forEach(btn=>{
    btn.addEventListener('click',()=>selectMonth(btn.getAttribute('data-m')));
  });

  // KPIs
  document.getElementById('kpis').innerHTML=[
    {l:'MTD Revenue',v:fk(mRev),n:`${elapsed} of ${totDays} days`,c:'blue'},
    {l:'Month-End Forecast',v:fk(fore),n:avgD>0?fk(avgD)+'/day avg':'',c:pc},
    {l:'Monthly Budget',v:fk(bud),n:MN[mo-1]+' '+yr,c:'blue'},
    {l:'Pace vs Budget',v:pace.toFixed(1)+'%',b:pace>=100?'▲ On pace':pace>=90?'⚠ Near pace':'▼ Below pace',bc,c:pc},
    {l:'Variance vs Budget',v:(varB>=0?'+':'')+fk(Math.abs(varB)),n:varB>=0?'ahead':'behind',c:varB>=0?'green':'red'},
    {l:'Required Daily',v:fk(req),n:`${remaining} days left`,c:req<=avgD?'green':'yellow'},
  ].map(k=>`<div class="kpi ${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value">${k.v}</div>${k.b?`<div><span class="kpi-badge ${k.bc}">${k.b}</span></div>`:''}${k.n?`<div class="kpi-note">${k.n}</div>`:''}</div>`).join('');

  // Exec summary
  const pw=pace>=100?'<span class="hi-green">ahead of budget</span>':pace>=90?'<span class="hi-yellow">near budget</span>':'<span class="hi-red">below budget</span>';
  document.getElementById('es').innerHTML=[
    `Pacing at <strong class="${pace>=100?'hi-green':pace>=90?'hi-yellow':'hi-red'}">${pace.toFixed(1)}% of budget</strong>, ${pw}. Projected finish: <strong>${fk(fore)}</strong> vs <strong>${fk(bud)}</strong>.`,
    `<strong>GAM</strong> <span class="hi-blue">${gp}%</span> · <strong>Xandr</strong> <span class="hi-blue">${xp}%</span> of MTD revenue.`,
    `Top partners: <strong>${partners.slice(0,3).map(([n])=>n).join(', ')}</strong>.`,
    risers.length?`7-day risers: <span class="hi-green">${risers.map(r=>r.n).join(', ')}</span>.`:'No significant risers.',
    decls.length?`7-day decliners: <span class="hi-red">${decls.map(d=>d.n).join(', ')}</span>.`:'No significant decliners.',
    `Required daily to hit budget: <strong>${fk(req)}/day</strong> over ${remaining} days.`,
  ].map(s=>`<li>${s}</li>`).join('');

  // Charts
  // Destroy all non-drill charts before rebuild
  Object.keys(CHARTS).forEach(k=>{
    if(k==='drill')return;
    try{CHARTS[k].destroy();}catch(e){}
    delete CHARTS[k];
  });
  // Force canvas reset
  ['cc','dc2','sc'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const p=el.parentNode;const n=el.cloneNode();p.replaceChild(n,el);}
  });

  CHARTS.cum=new Chart(document.getElementById('cc'),{type:'line',data:{labels:selDates.map(dl),datasets:[
    {label:'Actual',data:cumD,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:2,borderWidth:2},
    {label:'Budget',data:cumB,borderColor:'rgba(245,158,11,.5)',borderDash:[5,5],fill:false,tension:0,pointRadius:0,borderWidth:1.5},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b8fa8',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fk(c.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8b8fa8',font:{size:10},maxTicksLimit:10,maxRotation:0}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8b8fa8',font:{size:10},callback:v=>fk(v)}}}}});

  CHARTS.daily=new Chart(document.getElementById('dc2'),{type:'bar',data:{labels:selDates.map(dl),datasets:[
    {label:'GAM',data:selDates.map(d=>DG[d]||0),backgroundColor:'#3b82f6',borderRadius:3,borderSkipped:false},
    {label:'Xandr',data:selDates.map(d=>DX[d]||0),backgroundColor:'#a855f7',borderRadius:3,borderSkipped:false},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#8b8fa8',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+fk(c.raw)}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#8b8fa8',font:{size:10},maxTicksLimit:14,maxRotation:45}},y:{stacked:true,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8b8fa8',font:{size:10},callback:v=>fk(v)}}}}});

  document.getElementById('ss').innerHTML=`
    <div class="source-block"><div class="sv" style="color:#3b82f6">${fk(mGAM)}</div><div class="sl">GAM</div><div class="sp" style="color:#3b82f6">${gp}%</div></div>
    <div class="source-block"><div class="sv" style="color:#a855f7">${fk(mXan)}</div><div class="sl">Xandr</div><div class="sp" style="color:#a855f7">${xp}%</div></div>`;

  CHARTS.src=new Chart(document.getElementById('sc'),{type:'doughnut',data:{labels:['GAM','Xandr'],datasets:[{data:[mGAM,mXan],backgroundColor:['#3b82f6','#a855f7'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.label+': '+fk(c.raw)}}}}});

  // Partner table — using addEventListener, no inline onclick
  const tbody=document.getElementById('pt');
  tbody.innerHTML='';
  partners.forEach(([name,p])=>{
    const share=totRev>0?p.rev/totRev*100:0;
    const d7avg=p.d7/Math.min(7,d7d.length);
    const t=p.d7p>0?(p.d7-p.d7p)/p.d7p*100:null;
    const ecpm=p.imp>0?p.rev/(p.imp/1000):0;
    const tc=t===null?'trend-flat':t>5?'trend-up':t<-5?'trend-dn':'trend-flat';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><strong>${name}</strong> <span class="hint">View detail →</span><br><span style="font-size:10px;color:var(--muted)">${p.source||'GAM'}</span></td>
      <td>${fk(p.rev)}</td>
      <td><div>${share.toFixed(1)}%</div><div class="pct-bar-wrap"><div class="pct-bar" style="width:${Math.min(share*3,100)}%;background:var(--blue)"></div></div></td>
      <td>${fk(p.today)}</td>
      <td>${fk(d7avg)}</td>
      <td class="${tc}">${t===null?'—':fp(t)}</td>
      <td>${fd(ecpm,2)}</td>`;
    tr.addEventListener('click', function(){ openDrill(name); });
    tbody.appendChild(tr);
  });

  // Watchlist
  document.getElementById('wc').textContent=WL.length;
  document.getElementById('wl').innerHTML=WL.length?WL.map(w=>`<div class="watch-item"><div><div class="watch-name">${w.n}</div><div class="watch-detail">${w.det}</div></div><span class="watch-tag tag-${w.tag}">${w.lbl}</span></div>`).join(''):`<div style="color:var(--muted);font-size:13px;padding:1rem 0;text-align:center">All clear ✓</div>`;



  document.getElementById('rev-state').style.display='none';
  document.getElementById('rev-main').style.display='';
}

    <div class="two-col">
      <div class="card">
        <div class="card-title">P&L Summary — SMG ($000s) <span style="font-weight:400;color:var(--muted)">Jan–May 2026</span></div>
        <div style="overflow-x:auto"><table class="data-table">
          <thead><tr><th></th>${PL_DATA.months.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
          <tbody>
            <tr><td style="color:var(--muted);font-size:11px">Total Revenue</td>${PL_DATA.smg_revenue.map(v=>`<td>${fk(v)}</td>`).join('')}</tr>
            <tr><td style="color:var(--muted);font-size:11px">Total Expenses</td>${PL_DATA.smg_expense.map(v=>`<td style="color:var(--muted)">${fk(v)}</td>`).join('')}</tr>
            <tr style="border-top:1px solid rgba(255,255,255,.08)">
              <td style="color:var(--muted);font-size:11px">SMG EBITDA</td>
              ${PL_DATA.smg_revenue.map((r,i)=>{
                const e=r-PL_DATA.smg_expense[i];
                return `<td class="${e>=0?'hi-green':'hi-red'}">${e>=0?'+':''}${fk(e)}</td>`;
              }).join('')}
            </tr>
          </tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-title">Affiliate Network <span style="font-weight:400;color:var(--muted)">Jan–May 2026</span></div>
        <div style="overflow-x:auto"><table class="data-table">
          <thead><tr><th></th>${PL_DATA.months.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
          <tbody>
            <tr><td style="color:var(--muted);font-size:11px">Revenue ($K)</td>${PL_DATA.affiliate_rev.map(v=>`<td>${fk(v)}</td>`).join('')}</tr>
            <tr><td style="color:var(--muted);font-size:11px">EBITDA ($K)</td>${PL_DATA.affiliate_ebitda.map(v=>`<td class="${v>=0?'hi-green':'hi-red'}">${v>=0?'+':''}${fk(v)}</td>`).join('')}</tr>
            <tr><td style="color:var(--muted);font-size:11px">Margin</td>${PL_DATA.affiliate_margin.map(v=>`<td style="color:var(--muted)">${v}</td>`).join('')}</tr>
          </tbody>
        </table></div>
      </div>
    </div>`;

  new Chart(document.getElementById('goals-chart'), {
    type:'bar',
    data:{
      labels: months,
      datasets:[
        { label:'2026 Actual', data:REV_GOALS.actuals_2026, backgroundColor:'rgba(59,130,246,.7)', borderColor:'#3b82f6', borderWidth:1 },
        { label:'2026 Budget', data:REV_GOALS.budget_2026, backgroundColor:'rgba(245,158,11,.2)', borderColor:'#f59e0b', borderWidth:1, borderDash:[4,4] },
        { label:'2025 Actual', data:REV_GOALS.actuals_2025, type:'line', borderColor:'#a855f7', backgroundColor:'transparent', borderWidth:2, pointRadius:3, pointBackgroundColor:'#a855f7' },
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa8',font:{size:11}}}},scales:{x:{ticks:{color:'#8b8fa8'}},y:{ticks:{color:'#8b8fa8',callback:v=>'$'+(v/1e6).toFixed(1)+'M'},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

// Init traffic and P&L pages on tab click
document.getElementById('tab-tra').addEventListener('click', ()=>{ if(!document.getElementById('tra-main').innerHTML) buildTraffic(); });
document.getElementById('tab-pl').addEventListener('click',  ()=>{ if(!document.getElementById('pl-main').innerHTML)  buildPL(); });
</script>
</body>
</html>
